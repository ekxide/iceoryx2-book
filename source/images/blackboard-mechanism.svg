<svg viewBox="0 0 600 432" role="img" aria-label="Blackboard in shared memory" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bb-box     { fill: var(--ix-surface, #141d2d); stroke: var(--ix-line, rgba(150,200,230,0.16)); stroke-width: 1; }
    .bb-port    { fill: rgba(45,212,232,0.10); stroke: var(--ix-ice, #2dd4e8); stroke-width: 1; }
    .bb-region  { fill: rgba(45,212,232,0.10); stroke: var(--ix-ice, #2dd4e8); stroke-width: 1.5; }
    .bb-seg     { fill: var(--ix-surface, #141d2d); stroke: var(--ix-muted-2, #6b7d8c); stroke-width: 1; stroke-dasharray: 5 3; }
    .bb-cell    { fill: var(--ix-surface-2, #1b2740); stroke: var(--ix-line, rgba(150,200,230,0.16)); stroke-width: 1; }
    .bb-title   { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 12px; fill: var(--ix-text, #eaf3f7); }
    .bb-port-t  { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 10px; fill: var(--ix-text, #eaf3f7); }
    .bb-region-t{ font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 12px; fill: var(--ix-text, #eaf3f7); }
    .bb-label   { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 10px; fill: var(--ix-muted, #bccbd6); }
    .bb-key     { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 9px; fill: var(--ix-text, #eaf3f7); }
    .bb-val     { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 9px; fill: var(--ix-text, #eaf3f7); }
    .bb-arrlbl  { font-family: var(--font-stack, sans-serif); font-size: 9px; fill: var(--ix-muted, #bccbd6); }
    .bb-flow    { stroke: var(--ix-muted, #bccbd6); stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="bbm-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <path d="M1,1 L9,5 L1,9 Z" fill="var(--ix-muted, #bccbd6)"/>
    </marker>
  </defs>

  <!-- Writer -->
  <rect class="bb-box" x="235" y="20" width="130" height="86" rx="12"/>
  <text class="bb-title" x="300" y="46" text-anchor="middle">Participant</text>
  <rect class="bb-port" x="249" y="62" width="102" height="30" rx="8"/>
  <text class="bb-port-t" x="300" y="81" text-anchor="middle">Writer Port</text>

  <!-- update arrows -->
  <line class="bb-flow" x1="278" y1="110" x2="278" y2="146" marker-end="url(#bbm-arrow)"/>
  <line class="bb-flow" x1="322" y1="110" x2="322" y2="146" marker-end="url(#bbm-arrow)"/>
  <text class="bb-arrlbl" x="270" y="132" text-anchor="end">update K1</text>
  <text class="bb-arrlbl" x="330" y="132" text-anchor="start">update K2</text>

  <!-- Shared memory region -->
  <rect class="bb-region" x="70" y="150" width="460" height="140" rx="12"/>
  <text class="bb-region-t" x="300" y="172" text-anchor="middle">Shared Memory Region</text>
  <rect class="bb-seg" x="190" y="190" width="220" height="84" rx="6"/>
  <text class="bb-label" x="300" y="208" text-anchor="middle">Key-Value Repository</text>
  <rect class="bb-cell" x="219" y="216" width="44" height="20" rx="3"/>
  <rect class="bb-cell" x="265" y="216" width="44" height="20" rx="3"/>
  <rect class="bb-cell" x="311" y="216" width="70" height="20" rx="3"/>
  <text class="bb-key" x="241" y="230" text-anchor="middle">K1</text>
  <text class="bb-key" x="287" y="230" text-anchor="middle">K2</text>
  <text class="bb-key" x="346" y="230" text-anchor="middle">…</text>
  <rect class="bb-cell" x="219" y="238" width="44" height="20" rx="3"/>
  <rect class="bb-cell" x="265" y="238" width="44" height="20" rx="3"/>
  <rect class="bb-cell" x="311" y="238" width="70" height="20" rx="3"/>
  <text class="bb-val" x="241" y="252" text-anchor="middle">V1</text>
  <text class="bb-val" x="287" y="252" text-anchor="middle">V2</text>
  <text class="bb-val" x="346" y="252" text-anchor="middle">…</text>

  <!-- copy arrows -->
  <line class="bb-flow" x1="205" y1="326" x2="205" y2="294" marker-end="url(#bbm-arrow)"/>
  <line class="bb-flow" x1="395" y1="326" x2="395" y2="294" marker-end="url(#bbm-arrow)"/>
  <text class="bb-arrlbl" x="197" y="312" text-anchor="end">copy K1</text>
  <text class="bb-arrlbl" x="403" y="312" text-anchor="start">copy K2</text>

  <!-- Readers -->
  <rect class="bb-box" x="140" y="330" width="130" height="86" rx="12"/>
  <text class="bb-title" x="205" y="356" text-anchor="middle">Participant</text>
  <rect class="bb-port" x="154" y="372" width="102" height="30" rx="8"/>
  <text class="bb-port-t" x="205" y="391" text-anchor="middle">Reader Port</text>

  <rect class="bb-box" x="330" y="330" width="130" height="86" rx="12"/>
  <text class="bb-title" x="395" y="356" text-anchor="middle">Participant</text>
  <rect class="bb-port" x="344" y="372" width="102" height="30" rx="8"/>
  <text class="bb-port-t" x="395" y="391" text-anchor="middle">Reader Port</text>
</svg>
