<svg viewBox="0 0 600 552" role="img" aria-label="Request-response over shared memory" xmlns="http://www.w3.org/2000/svg">
  <style>
    .pm-box   { fill: var(--ix-surface, #141d2d); stroke: var(--ix-box-line, #6b7d8c); stroke-width: 1.5; }
    .pm-port  { fill: rgba(45,212,232,0.10); stroke: var(--ix-ice, #2dd4e8); stroke-width: 1; }
    .pm-smr   { fill: rgba(45,212,232,0.10); stroke: var(--ix-ice, #2dd4e8); stroke-width: 1.5; }
    .pm-seg   { fill: var(--ix-surface, #141d2d); stroke: var(--ix-muted-2, #6b7d8c); stroke-width: 1; stroke-dasharray: 5 3; }
    .pm-new   { fill: var(--ix-ice, #2dd4e8); }
    .pm-held  { fill: var(--ix-blue, #5b8def); }
    .pm-free  { fill: none; stroke: var(--ix-muted, #bccbd6); stroke-width: 1.5; }
    .pm-title { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 12px; fill: var(--ix-text, #eaf3f7); }
    .pm-port-t{ font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 10px; fill: var(--ix-text, #eaf3f7); }
    .pm-sub   { font-family: var(--font-stack, sans-serif); font-size: 9px; fill: var(--ix-muted, #bccbd6); }
    .pm-label { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 10px; fill: var(--ix-muted, #bccbd6); }
    .pm-cell  { font-family: var(--font-stack, sans-serif); font-size: 8.5px; fill: var(--ix-muted, #bccbd6); }
    .pm-leg   { font-family: var(--font-stack, sans-serif); font-size: 9.5px; fill: var(--ix-muted, #bccbd6); }
    .pm-flow  { stroke: var(--ix-muted, #bccbd6); stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="rm-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <path d="M1,1 L9,5 L1,9 Z" fill="var(--ix-muted, #bccbd6)"/>
    </marker>
  </defs>

  <!-- Client -->
  <rect class="pm-box" x="14" y="220" width="120" height="96" rx="12"/>
  <text class="pm-title" x="74" y="246" text-anchor="middle">Participant</text>
  <rect class="pm-port" x="28" y="262" width="92" height="40" rx="8"/>
  <text class="pm-port-t" x="74" y="279" text-anchor="middle">Client Port</text>
  <text class="pm-sub" x="74" y="294" text-anchor="middle">Request/Response</text>

  <!-- Server -->
  <rect class="pm-box" x="466" y="220" width="120" height="96" rx="12"/>
  <text class="pm-title" x="526" y="246" text-anchor="middle">Participant</text>
  <rect class="pm-port" x="480" y="262" width="92" height="40" rx="8"/>
  <text class="pm-port-t" x="526" y="279" text-anchor="middle">Server Port</text>
  <text class="pm-sub" x="526" y="294" text-anchor="middle">Request/Response</text>

  <!-- Request region -->
  <rect class="pm-smr" x="160" y="20" width="280" height="220" rx="12"/>
  <text class="pm-title" x="300" y="44" text-anchor="middle">Request — Shared Memory Region</text>
  <rect class="pm-seg" x="176" y="58" width="248" height="84" rx="6"/>
  <text class="pm-label" x="300" y="76" text-anchor="middle">Payload Segment</text>
  <rect class="pm-held" x="190" y="92" width="24" height="18" rx="3"/>
  <rect class="pm-free" x="218" y="92" width="24" height="18" rx="3"/>
  <rect class="pm-free" x="246" y="92" width="24" height="18" rx="3"/>
  <rect class="pm-free" x="274" y="92" width="24" height="18" rx="3"/>
  <rect class="pm-free" x="302" y="92" width="24" height="18" rx="3"/>
  <rect class="pm-free" x="330" y="92" width="24" height="18" rx="3"/>
  <rect class="pm-free" x="358" y="92" width="24" height="18" rx="3"/>
  <rect class="pm-free" x="386" y="92" width="24" height="18" rx="3"/>
  <text class="pm-cell" x="202" y="126" text-anchor="middle">R₁</text>
  <text class="pm-cell" x="230" y="126" text-anchor="middle">R₂</text>
  <text class="pm-cell" x="258" y="126" text-anchor="middle">R₃</text>
  <text class="pm-cell" x="286" y="126" text-anchor="middle">R₄</text>
  <text class="pm-cell" x="314" y="126" text-anchor="middle">R₅</text>
  <text class="pm-cell" x="342" y="126" text-anchor="middle">R₆</text>
  <text class="pm-cell" x="370" y="126" text-anchor="middle">R₇</text>
  <text class="pm-cell" x="398" y="126" text-anchor="middle">R₈</text>
  <rect class="pm-seg" x="176" y="154" width="248" height="70" rx="6"/>
  <text class="pm-label" x="300" y="171" text-anchor="middle">Offset Channel</text>
  <rect class="pm-held" x="190" y="182" width="22" height="16" rx="3"/>
  <text class="pm-cell" x="201" y="212" text-anchor="middle">R₁</text>

  <!-- Response region -->
  <rect class="pm-smr" x="160" y="296" width="280" height="220" rx="12"/>
  <text class="pm-title" x="300" y="320" text-anchor="middle">Response — Shared Memory Region</text>
  <rect class="pm-seg" x="176" y="334" width="248" height="84" rx="6"/>
  <text class="pm-label" x="300" y="352" text-anchor="middle">Payload Segment</text>
  <rect class="pm-held" x="190" y="368" width="24" height="18" rx="3"/>
  <rect class="pm-held" x="218" y="368" width="24" height="18" rx="3"/>
  <rect class="pm-new"  x="246" y="368" width="24" height="18" rx="3"/>
  <rect class="pm-new"  x="274" y="368" width="24" height="18" rx="3"/>
  <rect class="pm-new"  x="302" y="368" width="24" height="18" rx="3"/>
  <rect class="pm-free" x="330" y="368" width="24" height="18" rx="3"/>
  <rect class="pm-free" x="358" y="368" width="24" height="18" rx="3"/>
  <rect class="pm-free" x="386" y="368" width="24" height="18" rx="3"/>
  <text class="pm-cell" x="202" y="402" text-anchor="middle">P₁</text>
  <text class="pm-cell" x="230" y="402" text-anchor="middle">P₂</text>
  <text class="pm-cell" x="258" y="402" text-anchor="middle">P₃</text>
  <text class="pm-cell" x="286" y="402" text-anchor="middle">P₄</text>
  <text class="pm-cell" x="314" y="402" text-anchor="middle">P₅</text>
  <text class="pm-cell" x="342" y="402" text-anchor="middle">P₆</text>
  <text class="pm-cell" x="370" y="402" text-anchor="middle">P₇</text>
  <text class="pm-cell" x="398" y="402" text-anchor="middle">P₈</text>
  <rect class="pm-seg" x="176" y="430" width="248" height="70" rx="6"/>
  <text class="pm-label" x="300" y="447" text-anchor="middle">Offset Channel</text>
  <rect class="pm-new"  x="190" y="458" width="22" height="16" rx="3"/>
  <rect class="pm-new"  x="216" y="458" width="22" height="16" rx="3"/>
  <rect class="pm-new"  x="242" y="458" width="22" height="16" rx="3"/>
  <rect class="pm-held" x="268" y="458" width="22" height="16" rx="3"/>
  <rect class="pm-held" x="294" y="458" width="22" height="16" rx="3"/>
  <text class="pm-cell" x="201" y="488" text-anchor="middle">P₃</text>
  <text class="pm-cell" x="227" y="488" text-anchor="middle">P₄</text>
  <text class="pm-cell" x="253" y="488" text-anchor="middle">P₅</text>
  <text class="pm-cell" x="279" y="488" text-anchor="middle">P₁</text>
  <text class="pm-cell" x="305" y="488" text-anchor="middle">P₂</text>

  <!-- Request flow: client -> request region -> server -->
  <line class="pm-flow" x1="74" y1="216" x2="74" y2="120"/>
  <line class="pm-flow" x1="74" y1="120" x2="154" y2="120" marker-end="url(#rm-arrow)"/>
  <line class="pm-flow" x1="446" y1="120" x2="526" y2="120"/>
  <line class="pm-flow" x1="526" y1="120" x2="526" y2="216" marker-end="url(#rm-arrow)"/>

  <!-- Response flow: server -> response region -> client -->
  <line class="pm-flow" x1="526" y1="320" x2="526" y2="420"/>
  <line class="pm-flow" x1="526" y1="420" x2="446" y2="420" marker-end="url(#rm-arrow)"/>
  <line class="pm-flow" x1="154" y1="420" x2="74" y2="420"/>
  <line class="pm-flow" x1="74" y1="420" x2="74" y2="320" marker-end="url(#rm-arrow)"/>

  <!-- Legend -->
  <rect class="pm-new"  x="220" y="532" width="14" height="11" rx="2"/>
  <text class="pm-leg" x="240" y="541">New</text>
  <rect class="pm-held" x="296" y="532" width="14" height="11" rx="2"/>
  <text class="pm-leg" x="316" y="541">Held</text>
  <rect class="pm-free" x="372" y="532" width="14" height="11" rx="2"/>
  <text class="pm-leg" x="392" y="541">Free</text>
</svg>
