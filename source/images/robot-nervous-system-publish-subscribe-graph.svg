<svg viewBox="30 64 540 178" role="img" aria-label="Communication graph of the Ultrasonic Sensor and Emergency Brake participants" xmlns="http://www.w3.org/2000/svg">
  <style>
    .rg-box   { fill: var(--ix-surface, #141d2d); stroke: var(--ix-line, rgba(150,200,230,0.16)); stroke-width: 1; }
    .rg-box-t { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 12px; fill: var(--ix-text, #eaf3f7); }
    .rg-role  { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 9px; fill: var(--ix-text, #eaf3f7); }
    .rg-svc   { fill: rgba(45,212,232,0.10); stroke: var(--ix-ice, #2dd4e8); stroke-width: 1.5; }
    .rg-svc-t { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 11px; fill: var(--ix-text, #eaf3f7); }
    .rg-svc-n { font-family: var(--font-stack, sans-serif); font-size: 9px; fill: var(--ix-muted, #bccbd6); }
    .rg-flow  { stroke: var(--ix-muted, #bccbd6); stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="rg-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <path d="M1,1 L9,5 L1,9 Z" fill="var(--ix-muted, #bccbd6)"/>
    </marker>
  </defs>

  <!-- Ultrasonic Sensor (Publisher) -->
  <rect class="rg-box" x="50" y="80" width="140" height="60" rx="10"/>
  <text class="rg-box-t" x="120" y="106" text-anchor="middle">Ultrasonic Sensor</text>
  <text class="rg-role" x="120" y="124" text-anchor="middle">Publisher</text>

  <!-- Emergency Brake (Subscriber) -->
  <rect class="rg-box" x="410" y="80" width="140" height="60" rx="10"/>
  <text class="rg-box-t" x="480" y="106" text-anchor="middle">Emergency Brake</text>
  <text class="rg-role" x="480" y="124" text-anchor="middle">Subscriber</text>

  <!-- Service -->
  <rect class="rg-svc" x="220" y="180" width="160" height="46" rx="10"/>
  <text class="rg-svc-t" x="300" y="200" text-anchor="middle">Service</text>
  <text class="rg-svc-n" x="300" y="216" text-anchor="middle">"distance_to_obstacle"</text>

  <!-- Publisher -> Service -->
  <path class="rg-flow" d="M120,143 V160 H280 V177" marker-end="url(#rg-arrow)"/>
  <!-- Service -> Subscriber -->
  <path class="rg-flow" d="M320,177 V160 H480 V143" marker-end="url(#rg-arrow)"/>
</svg>
