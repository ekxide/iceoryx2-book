<svg viewBox="44 26 512 290" role="img" aria-label="Lifecycle management via nodes" xmlns="http://www.w3.org/2000/svg">
  <style>
    .nl-part   { fill: var(--ix-surface, #141d2d); stroke: var(--ix-muted-2, #6b7d8c); stroke-width: 1.5; }
    .nl-part-t { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 10px; fill: var(--ix-text, #eaf3f7); }
    .nl-node   { fill: var(--ix-surface-2, #1b2740); stroke: var(--ix-line, rgba(150,200,230,0.16)); stroke-width: 1; }
    .nl-svc    { fill: rgba(45,212,232,0.10); stroke: var(--ix-ice, #2dd4e8); stroke-width: 1; }
    .nl-port   { fill: rgba(45,212,232,0.10); stroke: var(--ix-ice, #2dd4e8); stroke-width: 1; }
    .nl-d      { fill: none; stroke: var(--ix-muted-2, #6b7d8c); stroke-width: 1; stroke-dasharray: 5 3; }
    .nl-node-t { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 11px; fill: var(--ix-text, #eaf3f7); }
    .nl-sub    { font-family: var(--font-stack, sans-serif); font-size: 9px; fill: var(--ix-muted, #bccbd6); }
    .nl-alive  { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 9px; fill: var(--ix-mint, #6ff0c7); }
    .nl-svc-t  { font-family: var(--font-stack, sans-serif); font-size: 8.5px; fill: var(--ix-text, #eaf3f7); }
    .nl-port-t { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 7.5px; fill: var(--ix-text, #eaf3f7); }
    .nl-mon    { stroke: var(--ix-muted, #bccbd6); stroke-width: 1.5; stroke-dasharray: 4 3; fill: none; }
    .nl-mgmt   { stroke: var(--ix-muted-2, #6b7d8c); stroke-width: 1.5; stroke-dasharray: 4 3; fill: none; }
    .nl-legend { fill: var(--ix-bg-2, #080d16); stroke: var(--ix-line, rgba(150,200,230,0.16)); stroke-width: 1; }
    .nl-leg-h  { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 9px; fill: var(--ix-text, #eaf3f7); }
    .nl-leg-t  { font-family: var(--font-stack, sans-serif); font-size: 9px; fill: var(--ix-muted, #bccbd6); }
  </style>

  <!-- Peer-to-peer node monitoring (across participants) -->
  <line class="nl-mon" x1="188" y1="79" x2="229" y2="79"/>
  <line class="nl-mon" x1="371" y1="79" x2="412" y2="79"/>

  <!-- Participant 1 (Node A, two services + ports) -->
  <rect class="nl-part" x="50" y="32" width="134" height="160" rx="12"/>
  <text class="nl-part-t" x="117" y="48" text-anchor="middle">Participant 1</text>
  <line class="nl-mgmt" x1="91"  y1="100" x2="91"  y2="116"/>
  <line class="nl-mgmt" x1="151" y1="100" x2="151" y2="116"/>
  <line class="nl-mgmt" x1="91"  y1="146" x2="91"  y2="162"/>
  <line class="nl-mgmt" x1="151" y1="146" x2="151" y2="162"/>
  <rect class="nl-node" x="58" y="58" width="118" height="42" rx="10"/>
  <text class="nl-node-t" x="117" y="78" text-anchor="middle">Node A</text>
  <text class="nl-alive" x="117" y="92" text-anchor="middle">ALIVE</text>
  <rect class="nl-svc" x="66"  y="116" width="50" height="30" rx="6"/>
  <text class="nl-svc-t" x="91"  y="135" text-anchor="middle">Service</text>
  <rect class="nl-svc" x="126" y="116" width="50" height="30" rx="6"/>
  <text class="nl-svc-t" x="151" y="135" text-anchor="middle">Service</text>
  <rect class="nl-port" x="78"  y="162" width="26" height="18" rx="4"/>
  <text class="nl-port-t" x="91"  y="174" text-anchor="middle">Port</text>
  <rect class="nl-port" x="138" y="162" width="26" height="18" rx="4"/>
  <text class="nl-port-t" x="151" y="174" text-anchor="middle">Port</text>

  <!-- Participant 2 (Node B, one service + port) -->
  <rect class="nl-part" x="233" y="32" width="134" height="160" rx="12"/>
  <text class="nl-part-t" x="300" y="48" text-anchor="middle">Participant 2</text>
  <line class="nl-mgmt" x1="300" y1="100" x2="300" y2="116"/>
  <line class="nl-mgmt" x1="300" y1="146" x2="300" y2="162"/>
  <rect class="nl-node" x="241" y="58" width="118" height="42" rx="10"/>
  <text class="nl-node-t" x="300" y="78" text-anchor="middle">Node B</text>
  <text class="nl-alive" x="300" y="92" text-anchor="middle">ALIVE</text>
  <rect class="nl-svc" x="275" y="116" width="50" height="30" rx="6"/>
  <text class="nl-svc-t" x="300" y="135" text-anchor="middle">Service</text>
  <rect class="nl-port" x="287" y="162" width="26" height="18" rx="4"/>
  <text class="nl-port-t" x="300" y="174" text-anchor="middle">Port</text>

  <!-- Participant 3 (dead node, reclaimed resources) -->
  <g opacity="0.5">
    <rect class="nl-part" x="416" y="32" width="134" height="160" rx="12"/>
    <text class="nl-part-t" x="483" y="48" text-anchor="middle">Participant 3</text>
    <line class="nl-mgmt" x1="483" y1="100" x2="483" y2="116"/>
    <line class="nl-mgmt" x1="483" y1="146" x2="483" y2="162"/>
    <rect class="nl-d" x="424" y="58" width="118" height="42" rx="10"/>
    <text class="nl-node-t" x="483" y="78" text-anchor="middle">Node C</text>
    <text class="nl-sub" x="483" y="92" text-anchor="middle">DEAD</text>
    <rect class="nl-d" x="458" y="116" width="50" height="30" rx="6"/>
    <text class="nl-svc-t" x="483" y="135" text-anchor="middle">Service</text>
    <rect class="nl-d" x="470" y="162" width="26" height="18" rx="4"/>
    <text class="nl-port-t" x="483" y="174" text-anchor="middle">Port</text>
  </g>

  <!-- Legend -->
  <text class="nl-leg-h" x="74" y="232" text-anchor="start">Legend</text>
  <line class="nl-mon" x1="74" y1="251" x2="100" y2="251"/>
  <text class="nl-leg-t" x="108" y="255" text-anchor="start">Peer-to-peer monitoring</text>
  <line class="nl-mgmt" x1="74" y1="273" x2="100" y2="273"/>
  <text class="nl-leg-t" x="108" y="277" text-anchor="start">Service / Port lifecycle management</text>
  <rect class="nl-node" x="320" y="244" width="14" height="14" rx="3"/>
  <text class="nl-leg-t" x="342" y="255" text-anchor="start">Alive node</text>
  <rect class="nl-d" x="320" y="266" width="14" height="14" rx="3"/>
  <text class="nl-leg-t" x="342" y="277" text-anchor="start">Dead node</text>
</svg>
