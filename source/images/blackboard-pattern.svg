<svg viewBox="0 0 560 296" role="img" aria-label="Blackboard communication model" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bb-box   { fill: var(--ix-surface, #141d2d); stroke: var(--ix-line, rgba(150,200,230,0.16)); stroke-width: 1; }
    .bb-port  { fill: rgba(45,212,232,0.10); stroke: var(--ix-ice, #2dd4e8); stroke-width: 1; }
    .bb-svc   { fill: rgba(45,212,232,0.10); stroke: var(--ix-ice, #2dd4e8); stroke-width: 1.5; }
    .bb-title { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 12px; fill: var(--ix-text, #eaf3f7); }
    .bb-port-t{ font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 10px; fill: var(--ix-text, #eaf3f7); }
    .bb-sub   { font-family: var(--font-stack, sans-serif); font-size: 9px; fill: var(--ix-muted, #bccbd6); }
    .bb-svc-t { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 13px; fill: var(--ix-text, #eaf3f7); }
    .bb-svc-s { font-family: var(--font-stack, sans-serif); font-size: 9.5px; fill: var(--ix-muted, #bccbd6); }
    .bb-flow  { stroke: var(--ix-muted, #bccbd6); stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="bb-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <path d="M1,1 L9,5 L1,9 Z" fill="var(--ix-muted, #bccbd6)"/>
    </marker>
  </defs>

  <!-- Writer -->
  <rect class="bb-box" x="44" y="102" width="140" height="96" rx="12"/>
  <text class="bb-title" x="114" y="128" text-anchor="middle">Participant</text>
  <rect class="bb-port" x="58" y="144" width="112" height="40" rx="8"/>
  <text class="bb-port-t" x="114" y="161" text-anchor="middle">Writer Port</text>
  <text class="bb-sub" x="114" y="176" text-anchor="middle">Update values</text>

  <!-- Service -->
  <circle class="bb-svc" cx="280" cy="150" r="48"/>
  <text class="bb-svc-t" x="280" y="146" text-anchor="middle">Service</text>
  <text class="bb-svc-s" x="280" y="164" text-anchor="middle">/global_config</text>

  <!-- Reader 1 -->
  <rect class="bb-box" x="376" y="32" width="140" height="96" rx="12"/>
  <text class="bb-title" x="446" y="58" text-anchor="middle">Participant</text>
  <rect class="bb-port" x="390" y="74" width="112" height="40" rx="8"/>
  <text class="bb-port-t" x="446" y="91" text-anchor="middle">Reader Port</text>
  <text class="bb-sub" x="446" y="106" text-anchor="middle">Read values</text>

  <!-- Reader 2 -->
  <rect class="bb-box" x="376" y="172" width="140" height="96" rx="12"/>
  <text class="bb-title" x="446" y="198" text-anchor="middle">Participant</text>
  <rect class="bb-port" x="390" y="214" width="112" height="40" rx="8"/>
  <text class="bb-port-t" x="446" y="231" text-anchor="middle">Reader Port</text>
  <text class="bb-sub" x="446" y="246" text-anchor="middle">Read values</text>

  <!-- Flow -->
  <line class="bb-flow" x1="190" y1="150" x2="224" y2="150" marker-end="url(#bb-arrow)"/>
  <line class="bb-flow" x1="325" y1="117" x2="370" y2="83" marker-end="url(#bb-arrow)"/>
  <line class="bb-flow" x1="325" y1="183" x2="370" y2="217" marker-end="url(#bb-arrow)"/>
</svg>
