<svg viewBox="22 8 556 244" role="img" aria-label="Request-response sequence between the App and Larry Autopilot" xmlns="http://www.w3.org/2000/svg">
  <style>
    .rs-box   { fill: var(--ix-surface, #141d2d); stroke: var(--ix-box-line, #6b7d8c); stroke-width: 1.5; }
    .rs-box-t { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 12px; fill: var(--ix-text, #eaf3f7); }
    .rs-sub   { font-family: var(--font-stack, sans-serif); font-size: 9px; fill: var(--ix-muted, #bccbd6); }
    .rs-life  { stroke: var(--ix-muted-2, #6b7d8c); stroke-width: 1; stroke-dasharray: 4 4; fill: none; }
    .rs-msg   { stroke: var(--ix-muted, #bccbd6); stroke-width: 1.5; fill: none; }
    .rs-lbl   { font-family: var(--font-stack, sans-serif); font-size: 9.5px; fill: var(--ix-muted, #bccbd6); }
    .rs-axis  { font-family: var(--font-stack, sans-serif); font-size: 9px; fill: var(--ix-muted, #bccbd6); }
  </style>
  <defs>
    <marker id="rs-arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="var(--ix-muted, #bccbd6)"/>
    </marker>
  </defs>

  <!-- Lifelines -->
  <line class="rs-life" x1="95"  y1="60" x2="95"  y2="240"/>
  <line class="rs-life" x1="505" y1="60" x2="505" y2="240"/>

  <!-- Actors -->
  <rect class="rs-box" x="40" y="20" width="110" height="40" rx="9"/>
  <text class="rs-box-t" x="95" y="39" text-anchor="middle">Client</text>
  <text class="rs-sub" x="95" y="53" text-anchor="middle">App</text>
  <rect class="rs-box" x="450" y="20" width="110" height="40" rx="9"/>
  <text class="rs-box-t" x="505" y="39" text-anchor="middle">Server</text>
  <text class="rs-sub" x="505" y="53" text-anchor="middle">Larry Autopilot</text>

  <!-- Time axis (centered on the lifeline span) -->
  <line class="rs-msg" x1="58" y1="132" x2="58" y2="158" stroke-width="1" marker-end="url(#rs-arrow)"/>
  <text class="rs-axis" x="58" y="172" text-anchor="middle">time</text>

  <!-- Request -->
  <line class="rs-msg" x1="95" y1="86" x2="503" y2="86" marker-end="url(#rs-arrow)"/>
  <text class="rs-lbl" x="300" y="80" text-anchor="middle">Request: "Go to point B"</text>

  <!-- Responses (stream) -->
  <line class="rs-msg" x1="505" y1="110" x2="97" y2="110" marker-end="url(#rs-arrow)"/>
  <text class="rs-lbl" x="300" y="104" text-anchor="middle">Response: "Starting drive…"</text>
  <line class="rs-msg" x1="505" y1="134" x2="97" y2="134" marker-end="url(#rs-arrow)"/>
  <text class="rs-lbl" x="300" y="128" text-anchor="middle">Response: "At (10, 5), speed (1, 0)"</text>
  <line class="rs-msg" x1="505" y1="158" x2="97" y2="158" marker-end="url(#rs-arrow)"/>
  <text class="rs-lbl" x="300" y="152" text-anchor="middle">Response: "At (20, 5), speed (1, 0)"</text>
  <line class="rs-msg" x1="505" y1="182" x2="97" y2="182" marker-end="url(#rs-arrow)"/>
  <text class="rs-lbl" x="300" y="176" text-anchor="middle">Response: "At (30, 5), speed (0, 0)"</text>
  <line class="rs-msg" x1="505" y1="206" x2="97" y2="206" marker-end="url(#rs-arrow)"/>
  <text class="rs-lbl" x="300" y="200" text-anchor="middle">Response: "Arrived at destination!"</text>

  <!-- Cancel -->
  <line class="rs-msg" x1="95" y1="232" x2="503" y2="232" marker-end="url(#rs-arrow)"/>
  <text class="rs-lbl" x="300" y="226" text-anchor="middle">Cancel signal (drop pending response)</text>
</svg>
