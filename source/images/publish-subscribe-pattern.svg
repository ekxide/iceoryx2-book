<svg viewBox="0 0 560 296" role="img" aria-label="Publish-subscribe communication model" xmlns="http://www.w3.org/2000/svg">
  <style>
    .ps-box   { fill: var(--ix-surface, #141d2d); stroke: var(--ix-line, rgba(150,200,230,0.16)); stroke-width: 1; }
    .ps-port  { fill: rgba(45,212,232,0.10); stroke: var(--ix-ice, #2dd4e8); stroke-width: 1; }
    .ps-svc   { fill: rgba(45,212,232,0.10); stroke: var(--ix-ice, #2dd4e8); stroke-width: 1.5; }
    .ps-title { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 12px; fill: var(--ix-text, #eaf3f7); }
    .ps-port-t{ font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 10px; fill: var(--ix-text, #eaf3f7); }
    .ps-sub   { font-family: var(--font-stack, sans-serif); font-size: 9px; fill: var(--ix-muted, #bccbd6); }
    .ps-svc-t { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 13px; fill: var(--ix-text, #eaf3f7); }
    .ps-svc-s { font-family: var(--font-stack, sans-serif); font-size: 10px; fill: var(--ix-muted, #bccbd6); }
    .ps-flow  { stroke: var(--ix-muted, #bccbd6); stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="ps-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <path d="M1,1 L9,5 L1,9 Z" fill="var(--ix-muted, #bccbd6)"/>
    </marker>
  </defs>

  <!-- Publisher -->
  <rect class="ps-box" x="44" y="102" width="140" height="96" rx="12"/>
  <text class="ps-title" x="114" y="128" text-anchor="middle">Participant</text>
  <rect class="ps-port" x="58" y="144" width="112" height="40" rx="8"/>
  <text class="ps-port-t" x="114" y="161" text-anchor="middle">Publisher Port</text>
  <text class="ps-sub" x="114" y="176" text-anchor="middle">Produce payloads</text>

  <!-- Service -->
  <circle class="ps-svc" cx="280" cy="150" r="48"/>
  <text class="ps-svc-t" x="280" y="146" text-anchor="middle">Service</text>
  <text class="ps-svc-s" x="280" y="164" text-anchor="middle">/camera</text>

  <!-- Subscriber 1 -->
  <rect class="ps-box" x="376" y="32" width="140" height="96" rx="12"/>
  <text class="ps-title" x="446" y="58" text-anchor="middle">Participant</text>
  <rect class="ps-port" x="390" y="74" width="112" height="40" rx="8"/>
  <text class="ps-port-t" x="446" y="91" text-anchor="middle">Subscriber Port</text>
  <text class="ps-sub" x="446" y="106" text-anchor="middle">Consume payloads</text>

  <!-- Subscriber 2 -->
  <rect class="ps-box" x="376" y="172" width="140" height="96" rx="12"/>
  <text class="ps-title" x="446" y="198" text-anchor="middle">Participant</text>
  <rect class="ps-port" x="390" y="214" width="112" height="40" rx="8"/>
  <text class="ps-port-t" x="446" y="231" text-anchor="middle">Subscriber Port</text>
  <text class="ps-sub" x="446" y="246" text-anchor="middle">Consume payloads</text>

  <!-- Flow (endpoints kept clear of the circle and boxes) -->
  <line class="ps-flow" x1="190" y1="150" x2="224" y2="150" marker-end="url(#ps-arrow)"/>
  <line class="ps-flow" x1="325" y1="117" x2="370" y2="83" marker-end="url(#ps-arrow)"/>
  <line class="ps-flow" x1="325" y1="183" x2="370" y2="217" marker-end="url(#ps-arrow)"/>
</svg>
