<svg viewBox="0 0 600 320" role="img" aria-label="Memory regions accessible to communicating participants" xmlns="http://www.w3.org/2000/svg">
  <style>
    .sm-phys     { fill: var(--ix-bg-2, #080d16); stroke: var(--ix-line, rgba(150,200,230,0.16)); stroke-width: 1; }
    .sm-priv     { fill: var(--ix-surface, #141d2d); stroke: var(--ix-muted-2, #6b7d8c); stroke-width: 1; stroke-dasharray: 5 3; }
    .sm-shared   { fill: rgba(45,212,232,0.10); stroke: var(--ix-ice, #2dd4e8); stroke-width: 1.5; }
    .sm-box      { fill: var(--ix-surface, #141d2d); stroke: var(--ix-line, rgba(150,200,230,0.16)); stroke-width: 1; }
    .sm-phys-t   { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 12px; fill: var(--ix-muted, #bccbd6); }
    .sm-priv-t   { font-family: var(--font-stack, sans-serif); font-size: 10px; fill: var(--ix-muted, #bccbd6); }
    .sm-shared-t { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 11px; fill: var(--ix-text, #eaf3f7); }
    .sm-name     { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 10px; fill: var(--ix-text, #eaf3f7); }
    .sm-label    { font-family: var(--font-stack, sans-serif); font-size: 9px; fill: var(--ix-muted, #bccbd6); }
    .sm-flow     { stroke: var(--ix-muted, #bccbd6); stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="sm-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse" markerUnits="userSpaceOnUse" overflow="visible">
      <path d="M1,1 L9,5 L1,9 Z" fill="var(--ix-muted, #bccbd6)"/>
    </marker>
  </defs>

  <!-- Physical memory -->
  <rect class="sm-phys" x="210" y="20" width="180" height="280" rx="12"/>
  <text class="sm-phys-t" x="300" y="40" text-anchor="middle">Physical Memory</text>
  <rect class="sm-priv" x="228" y="58" width="144" height="56" rx="8"/>
  <text class="sm-priv-t" x="300" y="90" text-anchor="middle">Participant Memory</text>
  <rect class="sm-shared" x="228" y="132" width="144" height="76" rx="8"/>
  <text class="sm-shared-t" x="300" y="166" text-anchor="middle">Shared Memory</text>
  <text class="sm-shared-t" x="300" y="182" text-anchor="middle">Region</text>
  <rect class="sm-priv" x="228" y="226" width="144" height="56" rx="8"/>
  <text class="sm-priv-t" x="300" y="258" text-anchor="middle">Participant Memory</text>

  <!-- Participants -->
  <rect class="sm-box" x="60" y="148" width="80" height="44" rx="10"/>
  <text class="sm-name" x="100" y="174" text-anchor="middle">Participant</text>
  <rect class="sm-box" x="460" y="148" width="80" height="44" rx="10"/>
  <text class="sm-name" x="500" y="174" text-anchor="middle">Participant</text>

  <!-- Access -->
  <line class="sm-flow" x1="148" y1="170" x2="222" y2="170" marker-start="url(#sm-arrow)" marker-end="url(#sm-arrow)"/>
  <line class="sm-flow" x1="150" y1="156" x2="222" y2="106" marker-start="url(#sm-arrow)" marker-end="url(#sm-arrow)"/>
  <line class="sm-flow" x1="452" y1="170" x2="378" y2="170" marker-start="url(#sm-arrow)" marker-end="url(#sm-arrow)"/>
  <line class="sm-flow" x1="450" y1="184" x2="378" y2="234" marker-start="url(#sm-arrow)" marker-end="url(#sm-arrow)"/>
</svg>
