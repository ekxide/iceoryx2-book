<svg viewBox="26 74 548 172" role="img" aria-label="Cross-language zero-copy communication" xmlns="http://www.w3.org/2000/svg">
  <style>
    .cl-smr    { fill: rgba(45,212,232,0.10); stroke: var(--ix-ice, #2dd4e8); stroke-width: 1.5; }
    .cl-smr-t  { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 12px; fill: var(--ix-text, #eaf3f7); }
    .cl-smr-s  { font-family: var(--font-stack, sans-serif); font-size: 9px; fill: var(--ix-muted, #bccbd6); }
    .cl-seg    { fill: var(--ix-surface, #141d2d); stroke: var(--ix-muted-2, #6b7d8c); stroke-width: 1; stroke-dasharray: 5 3; }
    .cl-seg-t  { font-family: var(--font-stack, sans-serif); font-size: 9px; fill: var(--ix-muted, #bccbd6); }
    .cl-box    { fill: var(--ix-surface, #141d2d); stroke: var(--ix-line, rgba(150,200,230,0.16)); stroke-width: 1; }
    .cl-name   { font-family: var(--font-stack, sans-serif); font-weight: 600; font-size: 11px; fill: var(--ix-text, #eaf3f7); }
    .cl-name-s { font-family: var(--font-stack, sans-serif); font-size: 9px; fill: var(--ix-muted, #bccbd6); }
    .cl-flow   { stroke: var(--ix-muted, #bccbd6); stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="cl-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse" markerUnits="userSpaceOnUse" overflow="visible">
      <path d="M1,1 L9,5 L1,9 Z" fill="var(--ix-muted, #bccbd6)"/>
    </marker>
  </defs>

  <!-- Shared memory region -->
  <rect class="cl-smr" x="212" y="96" width="176" height="128" rx="12"/>
  <text class="cl-smr-t" x="300" y="120" text-anchor="middle">Shared Memory Region</text>
  <text class="cl-smr-s" x="300" y="137" text-anchor="middle">Zero-Copy Data Exchange</text>
  <rect class="cl-seg" x="228" y="152" width="144" height="52" rx="6"/>
  <text class="cl-seg-t" x="300" y="182" text-anchor="middle">Relocatable Data Types</text>

  <!-- Applications -->
  <rect class="cl-box" x="40" y="138" width="84" height="44" rx="10"/>
  <text class="cl-name" x="82" y="158" text-anchor="middle">Rust</text>
  <text class="cl-name-s" x="82" y="172" text-anchor="middle">Application</text>

  <rect class="cl-box" x="476" y="88" width="84" height="44" rx="10"/>
  <text class="cl-name" x="518" y="108" text-anchor="middle">C++</text>
  <text class="cl-name-s" x="518" y="122" text-anchor="middle">Application</text>

  <rect class="cl-box" x="476" y="138" width="84" height="44" rx="10"/>
  <text class="cl-name" x="518" y="158" text-anchor="middle">C</text>
  <text class="cl-name-s" x="518" y="172" text-anchor="middle">Application</text>

  <rect class="cl-box" x="476" y="188" width="84" height="44" rx="10"/>
  <text class="cl-name" x="518" y="208" text-anchor="middle">Python</text>
  <text class="cl-name-s" x="518" y="222" text-anchor="middle">Application</text>

  <!-- Bidirectional communication -->
  <line class="cl-flow" x1="130" y1="160" x2="206" y2="160" marker-start="url(#cl-arrow)" marker-end="url(#cl-arrow)"/>
  <line class="cl-flow" x1="392" y1="142" x2="470" y2="116" marker-start="url(#cl-arrow)" marker-end="url(#cl-arrow)"/>
  <line class="cl-flow" x1="394" y1="160" x2="470" y2="160" marker-start="url(#cl-arrow)" marker-end="url(#cl-arrow)"/>
  <line class="cl-flow" x1="392" y1="178" x2="470" y2="204" marker-start="url(#cl-arrow)" marker-end="url(#cl-arrow)"/>
</svg>
