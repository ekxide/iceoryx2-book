<svg viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .custom-fonts {
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="5"
     refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 8 2.5, 0 5" fill="#6c7b7f" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="420" fill="transparent"/>

  <!-- Shared Memory Region -->
  <rect x="75" y="135" width="450" height="160" fill="#4b5563" stroke="#374151" stroke-width="2" />
  <text x="300" y="158" text-anchor="middle" class="custom-fonts" font-size="14" font-weight="bold" fill="white">Shared Memory Region</text>

  <!-- Key-Value Repository -->
  <rect x="190" y="175" width="220" height="100" fill="none" stroke="white" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="300" y="198" text-anchor="middle" class="custom-fonts" font-size="11" font-weight="bold" fill="white">Key-Value Repository</text>

  <!-- Key-Value Pairs -->
  <rect x="225" y="210" width="150" height="23" fill="#9ca3af" stroke="#6c7b7f" stroke-width="2"/>
  <rect x="225" y="210" width="30" height="23" fill="#9ca3af" stroke="#6c7b7f" stroke-width="2"/>
  <text x="240" y="225" text-anchor="middle" class="custom-fonts" font-size="8" fill="white">K1</text>
  <rect x="255" y="210" width="30" height="23" fill="#9ca3af" stroke="#6c7b7f" stroke-width="2"/>
  <text x="270" y="225" text-anchor="middle" class="custom-fonts" font-size="8" fill="white">K2</text>
  <rect x="285" y="210" width="90" height="23" fill="#9ca3af" stroke="#6c7b7f" stroke-width="2"/>
  <text x="327" y="225" text-anchor="middle" class="custom-fonts" font-size="8" fill="white">...</text>
  <rect x="225" y="233" width="150" height="23" fill="#9ca3af" stroke="#6c7b7f" stroke-width="2"/>
  <rect x="225" y="233" width="30" height="23" fill="#9ca3af" stroke="#6c7b7f" stroke-width="2"/>
  <text x="240" y="248" text-anchor="middle" class="custom-fonts" font-size="8" fill="white">V1</text>
  <rect x="255" y="233" width="30" height="23" fill="#9ca3af" stroke="#6c7b7f" stroke-width="2"/>
  <text x="270" y="248" text-anchor="middle" class="custom-fonts" font-size="8" fill="white">V2</text>
  <rect x="285" y="233" width="90" height="23" fill="#9ca3af" stroke="#6c7b7f" stroke-width="2"/>
  <text x="327" y="248" text-anchor="middle" class="custom-fonts" font-size="8" fill="white">...</text>

  <!-- Writer -->
  <rect x="252" y="30" width="95" height="50" fill="#f9fafb" stroke="#6c7b7f" stroke-width="2" />
  <text x="300" y="58" text-anchor="middle" class="custom-fonts" font-size="11" font-weight="bold" fill="#374151">Writer</text>

  <!-- First reader -->
  <rect x="170" y="350" width="95" height="50" fill="#f9fafb" stroke="#6c7b7f" stroke-width="2" />
  <text x="218" y="378" text-anchor="middle" class="custom-fonts" font-size="11" font-weight="bold" fill="#374151">Reader</text>

  <!-- Second reader -->
  <rect x="335" y="350" width="95" height="50" fill="#f9fafb" stroke="#6c7b7f" stroke-width="2" />
  <text x="383" y="378" text-anchor="middle" class="custom-fonts" font-size="11" font-weight="bold" fill="#374151">Reader</text>

  <!-- Arrows from writer to shared memory region -->
  <line x1="279" y1="80" x2="279" y2="135" stroke="#6c7b7f" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="236" y="100" font-size="9" fill="#6c7b7f">update</text>
  <text x="227" y="112" font-size="9" fill="#6c7b7f">value for K1</text>

  <line x1="320" y1="80" x2="320" y2="135" stroke="#6c7b7f" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="354" y="100" font-size="9" fill="#6c7b7f">update</text>
  <text x="345" y="112" font-size="9" fill="#6c7b7f">value for K2</text>
  <line x1="329" y1="80" x2="329" y2="135" stroke="#6c7b7f" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="4,4"/>
  <line x1="338" y1="80" x2="338" y2="135" stroke="#6c7b7f" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="3,3"/>

  <!-- Arrows from readers to shared memory region -->
  <line x1="218" y1="350" x2="218" y2="295" stroke="#6c7b7f" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="168" y="326" font-size="9" fill="#6c7b7f">get copy of</text>
  <text x="167" y="338" font-size="9" fill="#6c7b7f">value for K1</text>

  <line x1="362" y1="350" x2="362" y2="295" stroke="#6c7b7f" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="312" y="326" font-size="9" fill="#6c7b7f">get copy of</text>
  <text x="311" y="338" font-size="9" fill="#6c7b7f">value for K1</text>

  <line x1="403" y1="350" x2="403" y2="295" stroke="#6c7b7f" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="428" y="326" font-size="9" fill="#6c7b7f">get copy of</text>
  <text x="427" y="338" font-size="9" fill="#6c7b7f">value for K2</text>
  <line x1="412" y1="350" x2="412" y2="295" stroke="#6c7b7f" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="4,4"/>
  <line x1="421" y1="350" x2="421" y2="295" stroke="#6c7b7f" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="3,3"/>

</svg>
